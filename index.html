<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#12162a">
  <title>Orb Lamp</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #12162a;
      --orb:      #f0a500;
      --orb-dim:  #7a5200;
      --orb-dark: #3a2800;
      --cream:    #f0e6c8;
      --cream-dim:#a08c6e;
      --glass:    rgba(255,255,255,0.06);
      --glass-b:  rgba(255,255,255,0.10);
      --breath-s: 5s; /* updated by JS to match current breathing speed */
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--cream);
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    /* Ambient glow — breathes with the lamp */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 45%,
        rgba(240,165,0,0.22) 0%,
        rgba(240,165,0,0.06) 45%,
        transparent 70%);
      animation: ambient-breath var(--breath-s) ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes ambient-breath {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.06); }
    }

    body.lamp-off::before {
      animation: none;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    body.lamp-solid::before {
      animation: none;
      opacity: 1;
    }

    /* Layout */
    .app {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 3vh 6vw 4vh;
      max-width: 440px;
      margin: 0 auto;
    }

    /* Header */
    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .orb-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 0 24px rgba(240,165,0,0.4), 0 0 8px rgba(240,165,0,0.2);
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      color: var(--orb);
      text-transform: uppercase;
    }

    .status-line {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      color: var(--cream-dim);
      text-transform: uppercase;
      min-height: 1em;
    }

    /* Controls card */
    .controls {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    /* Glass card */
    .card {
      background: var(--glass);
      border: 1px solid rgba(240,165,0,0.14);
      border-radius: 16px;
      padding: 18px 20px;
      backdrop-filter: blur(8px);
    }

    .card-label {
      font-size: 0.65rem;
      letter-spacing: 0.16em;
      color: var(--cream-dim);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* Power toggle */
    .power-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .power-label {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: var(--cream);
    }

    .toggle-btn {
      width: 62px;
      height: 34px;
      border-radius: 17px;
      border: 2px solid var(--orb-dim);
      background: var(--orb-dark);
      position: relative;
      cursor: pointer;
      transition: background 0.3s, border-color 0.3s;
      -webkit-tap-highlight-color: transparent;
    }

    .toggle-btn::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 24px; height: 24px;
      border-radius: 50%;
      background: var(--cream-dim);
      transition: transform 0.3s, background 0.3s;
    }

    .toggle-btn.on {
      background: var(--orb-dim);
      border-color: var(--orb);
    }

    .toggle-btn.on::after {
      transform: translateX(28px);
      background: var(--orb);
      box-shadow: 0 0 8px rgba(240,165,0,0.6);
    }

    /* Mode selector */
    .mode-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .mode-btn {
      padding: 12px 8px;
      border-radius: 12px;
      border: 1.5px solid var(--orb-dim);
      background: transparent;
      color: var(--cream-dim);
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.25s;
      -webkit-tap-highlight-color: transparent;
    }

    .mode-btn.active {
      border-color: var(--orb);
      background: rgba(240,165,0,0.12);
      color: var(--orb);
      box-shadow: 0 0 12px rgba(240,165,0,0.15);
    }

    /* Sliders */
    .slider-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .slider-name {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: var(--cream-dim);
      text-transform: uppercase;
    }

    .slider-value {
      font-size: 0.78rem;
      color: var(--orb);
      font-variant-numeric: tabular-nums;
      min-width: 3.5em;
      text-align: right;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(to right, var(--orb) 0%, var(--orb) var(--pct, 50%), var(--orb-dark) var(--pct, 50%), var(--orb-dark) 100%);
      outline: none;
      cursor: pointer;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--orb);
      border: 2px solid #12162a;
      box-shadow: 0 0 8px rgba(240,165,0,0.5);
      cursor: pointer;
    }

    input[type=range]::-moz-range-thumb {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--orb);
      border: 2px solid #12162a;
      box-shadow: 0 0 8px rgba(240,165,0,0.5);
      cursor: pointer;
    }

    /* Connect button */
    .connect-btn {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: 1.5px solid var(--orb);
      background: rgba(240,165,0,0.10);
      color: var(--orb);
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      letter-spacing: 0.14em;
      cursor: pointer;
      transition: background 0.25s, box-shadow 0.25s;
      -webkit-tap-highlight-color: transparent;
    }

    .connect-btn:active {
      background: rgba(240,165,0,0.22);
      box-shadow: 0 0 16px rgba(240,165,0,0.25);
    }

    .connect-btn.connected {
      border-color: #4caf82;
      color: #4caf82;
      background: rgba(76,175,130,0.08);
    }

    /* Disabled state for controls */
    .controls-inner {
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: opacity 0.4s;
    }

    .controls-inner.disabled {
      opacity: 0.35;
      pointer-events: none;
    }

    @media (prefers-reduced-motion: reduce) {
      body::before { animation: none !important; }
    }
  </style>
</head>
<body class="lamp-off">
<div class="app">

  <header>
    <img src="icon-192.png" class="orb-icon" alt="Orb Lamp">
    <h1>Orb Lamp</h1>
    <div class="status-line" id="statusLine">Not connected</div>
  </header>

  <div class="controls">
    <button class="connect-btn" id="connectBtn">Connect to Orb</button>

    <div class="controls-inner disabled" id="controlsInner">

      <!-- Power -->
      <div class="card">
        <div class="power-row">
          <span class="power-label">Power</span>
          <button class="toggle-btn" id="powerBtn" aria-label="Power toggle"></button>
        </div>
      </div>

      <!-- Mode -->
      <div class="card">
        <div class="card-label">Mode</div>
        <div class="mode-row">
          <button class="mode-btn active" id="modeBreathing">Breathing</button>
          <button class="mode-btn" id="modeSolid">Solid</button>
        </div>
      </div>

      <!-- Brightness -->
      <div class="card">
        <div class="card-label">Brightness &amp; Speed</div>
        <div class="slider-row">
          <div class="slider-header">
            <span class="slider-name">Brightness</span>
            <span class="slider-value" id="brightnessVal">40%</span>
          </div>
          <input type="range" id="brightnessSlider" min="5" max="100" value="40"
                 aria-label="Brightness">
        </div>
        <div class="slider-row" style="margin-top:18px">
          <div class="slider-header">
            <span class="slider-name">Breath speed</span>
            <span class="slider-value" id="speedVal">5.0 s</span>
          </div>
          <input type="range" id="speedSlider" min="0" max="100" value="0"
                 aria-label="Breathing speed">
        </div>
      </div>

    </div><!-- /controls-inner -->
  </div><!-- /controls -->

</div><!-- /app -->

<script>
// ── State ──────────────────────────────────────────────────────
var state = {
  connected: false,
  on: false,
  mode: 'breathing',     // 'breathing' | 'solid'
  brightness: 0.40,
  breathNorm: 0,         // 0..1 slider value
};

// ── BLE ────────────────────────────────────────────────────────
var bleDevice = null, bleChar = null;
var UART_SERVICE = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
var UART_TX      = '6e400002-b5a3-f393-e0a9-e50e24dcca9e'; // write to Puck

function send(obj) {
  if (!bleChar) return;
  var msg = JSON.stringify(obj) + '\n';
  var buf = new TextEncoder().encode(msg);
  bleChar.writeValue(buf).catch(function(e) {
    setStatus('Send error — reconnect?');
  });
}

document.getElementById('connectBtn').addEventListener('click', function() {
  if (state.connected) { disconnect(); return; }
  navigator.bluetooth.requestDevice({
    filters: [{ namePrefix: 'Puck' }],
    optionalServices: [UART_SERVICE]
  })
  .then(function(device) {
    bleDevice = device;
    bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
    setStatus('Connecting…');
    return device.gatt.connect();
  })
  .then(function(server) { return server.getPrimaryService(UART_SERVICE); })
  .then(function(service) { return service.getCharacteristic(UART_TX); })
  .then(function(char) {
    bleChar = char;
    onConnected();
  })
  .catch(function(e) {
    setStatus('Connection failed');
    console.error(e);
  });
});

function onConnected() {
  state.connected = true;
  document.getElementById('connectBtn').textContent = 'Disconnect';
  document.getElementById('connectBtn').classList.add('connected');
  document.getElementById('controlsInner').classList.remove('disabled');
  setStatus('Connected');
  // Push current UI state to Puck
  syncAll();
}

function onDisconnected() {
  state.connected = false;
  bleChar = null;
  document.getElementById('connectBtn').textContent = 'Connect to Orb';
  document.getElementById('connectBtn').classList.remove('connected');
  document.getElementById('controlsInner').classList.add('disabled');
  setStatus('Disconnected');
}

function disconnect() {
  if (bleDevice && bleDevice.gatt.connected) bleDevice.gatt.disconnect();
}

function syncAll() {
  send({ cmd: 'mode', value: state.on ? state.mode : 'off' });
  send({ cmd: 'brightness', value: state.brightness });
  send({ cmd: 'breathSpeed', value: state.breathNorm });
}

// ── Power toggle ───────────────────────────────────────────────
var powerBtn = document.getElementById('powerBtn');
powerBtn.addEventListener('click', function() {
  state.on = !state.on;
  powerBtn.classList.toggle('on', state.on);
  updateBodyClass();
  send({ cmd: 'mode', value: state.on ? state.mode : 'off' });
});

// ── Mode buttons ───────────────────────────────────────────────
document.getElementById('modeBreathing').addEventListener('click', function() {
  setMode('breathing');
});
document.getElementById('modeSolid').addEventListener('click', function() {
  setMode('solid');
});

function setMode(m) {
  state.mode = m;
  document.getElementById('modeBreathing').classList.toggle('active', m === 'breathing');
  document.getElementById('modeSolid').classList.toggle('active', m === 'solid');
  document.getElementById('speedSlider').parentElement.parentElement.style.opacity =
    m === 'breathing' ? '1' : '0.35';
  updateBodyClass();
  if (state.on) send({ cmd: 'mode', value: m });
}

// ── Brightness slider ──────────────────────────────────────────
var brightnessSlider = document.getElementById('brightnessSlider');
var brightnessVal    = document.getElementById('brightnessVal');

brightnessSlider.addEventListener('input', function() {
  var pct = parseInt(this.value);
  state.brightness = pct / 100;
  brightnessVal.textContent = pct + '%';
  updateSliderTrack(this);
  if (state.connected) send({ cmd: 'brightness', value: state.brightness });
});

// ── Speed slider ───────────────────────────────────────────────
var speedSlider = document.getElementById('speedSlider');
var speedVal    = document.getElementById('speedVal');

// 0..1 norm → cycle time in seconds: 5.0s (0.2Hz) down to 1.67s (0.6Hz)
function normToCycle(n) {
  var hz = 0.2 + n * (0.6 - 0.2);
  return (1 / hz).toFixed(1);
}

speedSlider.addEventListener('input', function() {
  state.breathNorm = parseInt(this.value) / 100;
  var cycle = normToCycle(state.breathNorm);
  speedVal.textContent = cycle + ' s';
  updateSliderTrack(this);
  // Update ambient glow animation speed
  var cycleS = parseFloat(cycle);
  document.documentElement.style.setProperty('--breath-s', cycleS + 's');
  if (state.connected) send({ cmd: 'breathSpeed', value: state.breathNorm });
});

// ── Slider track fill helper ───────────────────────────────────
function updateSliderTrack(el) {
  var pct = ((el.value - el.min) / (el.max - el.min) * 100).toFixed(1) + '%';
  el.style.setProperty('--pct', pct);
}

// ── Body class → ambient glow state ───────────────────────────
function updateBodyClass() {
  document.body.classList.toggle('lamp-off',    !state.on);
  document.body.classList.toggle('lamp-solid',   state.on && state.mode === 'solid');
  document.body.classList.toggle('lamp-breathing', state.on && state.mode === 'breathing');
}

// ── Status line ────────────────────────────────────────────────
function setStatus(msg) {
  document.getElementById('statusLine').textContent = msg;
}

// ── Init ───────────────────────────────────────────────────────
updateSliderTrack(brightnessSlider);
updateSliderTrack(speedSlider);
setMode('breathing');
</script>
</body>
</html>
