<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#12162a">
  <title>Orb Lamp</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #12162a;
      --orb:       #f0a500;
      --orb-dim:   #7a5200;
      --orb-dark:  #3a2800;
      --cream:     #f0e6c8;
      --cream-dim: #a08c6e;
      --glass:     rgba(255,255,255,0.06);
      --green:     #4caf82;
      --red:       #e04545;
      --breath-s:  20s;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--cream);
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    /* Ambient glow — breathes with the lamp */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 45%,
        rgba(240,165,0,0.22) 0%,
        rgba(240,165,0,0.06) 45%,
        transparent 70%);
      animation: ambient-breath var(--breath-s) ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
      transition: opacity 0.8s ease;
    }

    @keyframes ambient-breath {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.06); }
    }

    body.lamp-off::before    { animation: none; opacity: 0; }
    body.lamp-solid::before  { animation: none; opacity: 1; }

    @media (prefers-reduced-motion: reduce) {
      body::before { animation: none !important; }
    }

    /* Layout */
    .app {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 3vh 6vw 4vh;
      max-width: 440px;
      margin: 0 auto;
    }

    /* Header */
    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .orb-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 0 24px rgba(240,165,0,0.4), 0 0 8px rgba(240,165,0,0.2);
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      color: var(--orb);
      text-transform: uppercase;
    }

    /* Connection status: a coloured dot + text, driven by the state machine */
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 1em;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--cream-dim);
      opacity: 0.5;
      transition: background 0.3s, box-shadow 0.3s, opacity 0.3s;
    }

    .status-dot.dot-connected {
      background: var(--green);
      opacity: 1;
      box-shadow: 0 0 8px rgba(76,175,130,0.7);
    }

    .status-dot.dot-busy {
      background: var(--orb);
      opacity: 1;
      animation: dot-pulse 1.1s ease-in-out infinite;
    }

    .status-dot.dot-error {
      background: var(--red);
      opacity: 1;
      box-shadow: 0 0 8px rgba(224,69,69,0.7);
    }

    @keyframes dot-pulse {
      0%, 100% { box-shadow: 0 0 3px rgba(240,165,0,0.5);  opacity: 0.55; }
      50%       { box-shadow: 0 0 12px rgba(240,165,0,0.95); opacity: 1;    }
    }

    @media (prefers-reduced-motion: reduce) {
      .status-dot.dot-busy { animation: none; }
    }

    .status-line {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      color: var(--cream-dim);
      text-transform: uppercase;
    }

    .version-line {
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      color: var(--cream-dim);
      opacity: 0.55;
      margin-top: 2px;
    }

    /* Controls */
    .controls {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      background: var(--glass);
      border: 1px solid rgba(240,165,0,0.14);
      border-radius: 16px;
      padding: 16px 20px;
      backdrop-filter: blur(8px);
    }

    .card-label {
      font-size: 0.65rem;
      letter-spacing: 0.16em;
      color: var(--cream-dim);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* Row layout for label + toggle */
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .row-label {
      font-family: 'Cinzel', serif;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      color: var(--cream);
    }

    .row-sublabel {
      font-size: 0.68rem;
      color: var(--cream-dim);
      margin-top: 2px;
      letter-spacing: 0.05em;
    }

    /* Toggle switch — reused for power and sleep */
    .toggle {
      width: 56px;
      height: 30px;
      border-radius: 15px;
      border: 2px solid var(--orb-dim);
      background: var(--orb-dark);
      position: relative;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.3s, border-color 0.3s;
      -webkit-tap-highlight-color: transparent;
    }

    .toggle::after {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--cream-dim);
      transition: transform 0.3s, background 0.3s;
    }

    .toggle.on {
      background: var(--orb-dim);
      border-color: var(--orb);
    }

    .toggle.on::after {
      transform: translateX(26px);
      background: var(--orb);
      box-shadow: 0 0 8px rgba(240,165,0,0.6);
    }

    /* Green variant for sleep toggle */
    .toggle.sleep-on {
      background: rgba(76,175,130,0.25);
      border-color: var(--green);
    }

    .toggle.sleep-on::after {
      transform: translateX(26px);
      background: var(--green);
      box-shadow: 0 0 8px rgba(76,175,130,0.5);
    }

    /* Mode buttons */
    .mode-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .mode-btn {
      padding: 11px 8px;
      border-radius: 12px;
      border: 1.5px solid var(--orb-dim);
      background: transparent;
      color: var(--cream-dim);
      font-family: 'Cinzel', serif;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.25s;
      -webkit-tap-highlight-color: transparent;
    }

    .mode-btn.active {
      border-color: var(--orb);
      background: rgba(240,165,0,0.12);
      color: var(--orb);
      box-shadow: 0 0 12px rgba(240,165,0,0.15);
    }

    /* Sliders */
    .slider-row { display: flex; flex-direction: column; gap: 8px; }
    .slider-row + .slider-row { margin-top: 16px; }

    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .slider-name {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--cream-dim);
      text-transform: uppercase;
    }

    .slider-value {
      font-size: 0.76rem;
      color: var(--orb);
      font-variant-numeric: tabular-nums;
      min-width: 3.5em;
      text-align: right;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(to right,
        var(--orb) 0%, var(--orb) var(--pct,40%),
        var(--orb-dark) var(--pct,40%), var(--orb-dark) 100%);
      outline: none;
      cursor: pointer;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--orb);
      border: 2px solid var(--bg);
      box-shadow: 0 0 8px rgba(240,165,0,0.5);
      cursor: pointer;
    }

    input[type=range]::-moz-range-thumb {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--orb);
      border: 2px solid var(--bg);
      box-shadow: 0 0 8px rgba(240,165,0,0.5);
      cursor: pointer;
    }

    /* Speed slider dims when in solid mode */
    .speed-card { transition: opacity 0.3s; }
    .speed-card.dimmed { opacity: 0.35; pointer-events: none; }

    /* Connect button */
    .connect-btn {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1.5px solid var(--orb);
      background: rgba(240,165,0,0.10);
      color: var(--orb);
      font-family: 'Cinzel', serif;
      font-size: 0.88rem;
      letter-spacing: 0.14em;
      cursor: pointer;
      transition: background 0.25s, box-shadow 0.25s, border-color 0.25s, color 0.25s;
      -webkit-tap-highlight-color: transparent;
    }

    .connect-btn:active {
      background: rgba(240,165,0,0.22);
    }

    .connect-btn.connected {
      border-color: var(--green);
      color: var(--green);
      background: rgba(76,175,130,0.08);
    }

    /* Cancel affordance while busy (scanning / connecting / reconnecting) */
    .connect-btn.busy {
      border-color: var(--cream-dim);
      color: var(--cream-dim);
      background: rgba(255,255,255,0.04);
    }

    .controls-inner {
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: opacity 0.4s;
    }

    .controls-inner.disabled {
      opacity: 0.35;
      pointer-events: none;
    }

    .test-btn {
      width: 100%;
      padding: 11px;
      border-radius: 12px;
      border: 1.5px solid var(--orb-dim);
      background: transparent;
      color: var(--cream-dim);
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .test-btn:not(:disabled):active {
      background: rgba(240,60,60,0.18);
      border-color: #e04545;
      color: #ff8a8a;
    }

    .test-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
  </style>
</head>
<body class="lamp-off">
<div class="app">

  <header>
    <img src="icon-192.png" class="orb-icon" alt="Orb Lamp">
    <h1>Orb Lamp</h1>
    <div class="status-row">
      <span class="status-dot" id="statusDot"></span>
      <div class="status-line" id="statusLine">Not connected</div>
    </div>
    <div class="version-line" id="versionLine"></div>
  </header>

  <div class="controls">

    <button class="connect-btn" id="connectBtn">Connect to Orb</button>

    <!-- Comms self-test: flashes the Puck's RED LED for 0.5s. Proves end-to-end
         communication independent of the lamp logic. -->
    <button class="test-btn" id="testBtn" disabled>Flash red LED (comms test)</button>

    <div class="controls-inner disabled" id="controlsInner">

      <!-- Power -->
      <div class="card">
        <div class="row">
          <span class="row-label">Power</span>
          <button class="toggle" id="powerToggle" aria-label="Power"></button>
        </div>
      </div>

      <!-- Sleep — arms a 1-hour auto-off. The lamp keeps running now and turns
           itself off after an hour; BLE stays alive so Power wakes it again. -->
      <div class="card">
        <div class="row">
          <div>
            <div class="row-label">Sleep</div>
            <div class="row-sublabel">Turn lamp off after 1 hour — Power wakes it</div>
          </div>
          <button class="toggle" id="sleepToggle" aria-label="Sleep"></button>
        </div>
      </div>

      <!-- Mode -->
      <div class="card">
        <div class="card-label">Mode</div>
        <div class="mode-row">
          <button class="mode-btn active" id="modeBreathing">Breathing</button>
          <button class="mode-btn" id="modeSolid">Solid</button>
        </div>
      </div>

      <!-- Brightness -->
      <div class="card">
        <div class="card-label">Brightness</div>
        <div class="slider-row">
          <div class="slider-header">
            <span class="slider-name">Level</span>
            <span class="slider-value" id="brightnessVal">40%</span>
          </div>
          <input type="range" id="brightnessSlider" min="5" max="100" value="40"
                 aria-label="Brightness">
        </div>
      </div>

      <!-- Breathing speed -->
      <div class="card speed-card" id="speedCard">
        <div class="card-label">Breath speed</div>
        <div class="slider-row">
          <div class="slider-header">
            <span class="slider-name">Cycle</span>
            <span class="slider-value" id="speedVal">20.0 s</span>
          </div>
          <input type="range" id="speedSlider" min="0" max="100" value="0"
                 aria-label="Breathing speed">
        </div>
      </div>

    </div>
  </div>

</div>

<script>
// ── App version ────────────────────────────────────────────────
// Bump this on every change you want to be able to identify at runtime.
var APP_VERSION = 'v0.11.2';

// ── BLE UUIDs ──────────────────────────────────────────────────
// Custom command service + characteristic (must match the firmware).
// Commands are written to CMD_CHAR as newline-terminated JSON. This is a
// dedicated characteristic, NOT the Nordic UART, so it is independent of
// the Puck's JS console.
var CMD_SERVICE = '6e40aa01-b5a3-f393-e0a9-e50e24dcca9e';
var CMD_CHAR    = '6e40aa02-b5a3-f393-e0a9-e50e24dcca9e';

// ── Connection tuning ──────────────────────────────────────────
var CONNECT_TIMEOUT_MS = 12000; // guard against gatt.connect() hanging forever
var RECONNECT_MAX      = 4;     // auto-reconnect attempts on an unexpected drop
var RECONNECT_BASE_MS  = 600;   // backoff step; delay = BASE * attempt number

// ── State ──────────────────────────────────────────────────────
var state = {
  connected:   false,   // true only while GATT is up and ready to write
  // The firmware boots ON (breathing) in onInit(). The app must default to the
  // SAME state, otherwise syncAll() would push {mode:'off'} on connect and turn
  // a happily-breathing lamp off. (Before the firmware maxLen fix that 'off'
  // was silently dropped as too long; now it lands, so the default matters.)
  on:          true,
  mode:        'breathing',
  brightness:  0.40,
  breathNorm:  0,
  sleepOn:     false,
};

var bleDevice = null, bleServer = null, bleCmdChar = null;

// Connection state machine: idle | scanning | connecting | connected |
// reconnecting | error. All UI (dot, status text, button, control enablement)
// is derived from this in setConnState() so the states can never disagree.
var connState = 'idle';

// Distinguishes a user-requested teardown from an unexpected radio drop, so we
// only auto-reconnect on the latter.
var userInitiatedDisconnect = false;
var reconnectAttempts = 0;
var reconnectTimer = null;

// ── BLE write queue ────────────────────────────────────────────
// Android permits only ONE outstanding GATT operation at a time. Firing
// several writeValue() calls back to back rejects all but the first with
// "GATT operation already in progress". So we queue writes and send them
// strictly one after another.
var txQueue = [], txBusy = false;

function pumpQueue() {
  if (txBusy || txQueue.length === 0) return;
  if (!bleCmdChar || !bleServer || !bleServer.connected) {
    // Not writable right now. Drop the backlog; the reconnect flow (if any)
    // owns the status line, so don't stomp it here.
    txQueue.length = 0;
    return;
  }
  txBusy = true;
  var bytes = txQueue.shift();
  bleCmdChar.writeValue(bytes)
    .then(function() { txBusy = false; pumpQueue(); })
    .catch(function(e) {
      txBusy = false;
      txQueue.length = 0;
      console.error('writeValue rejected:', e);
      // A failed write usually means the link is going down; the
      // gattserverdisconnected handler will drive reconnect. Only surface a
      // message if we still believe we're connected.
      if (connState === 'connected') setStatus('Write failed — retrying link');
    });
}

// ── Connection state machine ───────────────────────────────────
function setConnState(s, msg) {
  connState = s;
  state.connected = (s === 'connected');

  var dot     = document.getElementById('statusDot');
  var btn     = document.getElementById('connectBtn');
  var controls= document.getElementById('controlsInner');
  var testBtn = document.getElementById('testBtn');

  dot.className = 'status-dot';
  btn.classList.remove('connected', 'busy');

  switch (s) {
    case 'idle':
      setStatus(msg || 'Not connected');
      btn.textContent = 'Connect to Orb';
      controls.classList.add('disabled');
      testBtn.disabled = true;
      break;

    case 'scanning':
      dot.classList.add('dot-busy');
      btn.classList.add('busy');
      setStatus(msg || 'Scanning…');
      btn.textContent = 'Cancel';
      controls.classList.add('disabled');
      testBtn.disabled = true;
      break;

    case 'connecting':
      dot.classList.add('dot-busy');
      btn.classList.add('busy');
      setStatus(msg || 'Connecting…');
      btn.textContent = 'Cancel';
      controls.classList.add('disabled');
      testBtn.disabled = true;
      break;

    case 'reconnecting':
      dot.classList.add('dot-busy');
      btn.classList.add('busy');
      setStatus(msg || 'Reconnecting…');
      btn.textContent = 'Cancel';
      controls.classList.add('disabled');
      testBtn.disabled = true;
      break;

    case 'connected':
      dot.classList.add('dot-connected');
      setStatus(msg || 'Connected');
      btn.textContent = 'Disconnect';
      btn.classList.add('connected');
      controls.classList.remove('disabled');
      testBtn.disabled = false;
      break;

    case 'error':
      dot.classList.add('dot-error');
      setStatus(msg || 'Connection error');
      btn.textContent = 'Connect to Orb';
      controls.classList.add('disabled');
      testBtn.disabled = true;
      break;
  }
}

// ── Connect / disconnect ───────────────────────────────────────
function withTimeout(promise, ms, label) {
  return new Promise(function(resolve, reject) {
    var to = setTimeout(function() {
      reject(new Error((label || 'Operation') + ' timed out'));
    }, ms);
    promise.then(
      function(v) { clearTimeout(to); resolve(v); },
      function(e) { clearTimeout(to); reject(e); }
    );
  });
}

// The GATT half of a connection: connect, resolve the command characteristic,
// then go live. Shared by the first connect and every reconnect attempt.
function establishGatt(device) {
  return withTimeout(device.gatt.connect(), CONNECT_TIMEOUT_MS, 'Connect')
    .then(function(s)  { bleServer = s; return s.getPrimaryService(CMD_SERVICE); })
    .then(function(sv) { return sv.getCharacteristic(CMD_CHAR); })
    .then(function(c)  { bleCmdChar = c; onConnected(); });
}

function bleConnect() {
  setConnState('scanning');
  return navigator.bluetooth.requestDevice({
    filters: [{ namePrefix: 'Puck' }, { namePrefix: 'puck' }],
    optionalServices: [CMD_SERVICE]
  })
  .then(function(d) {
    bleDevice = d;
    // One listener per device object; reused across reconnects.
    bleDevice.addEventListener('gattserverdisconnected', onGattDisconnected);
    setConnState('connecting');
    return establishGatt(d);
  });
}

function bleDisconnect() {
  if (bleDevice && bleDevice.gatt && bleDevice.gatt.connected) {
    bleDevice.gatt.disconnect();
  }
}

// Tear everything down to a clean, idle, not-connected UI.
function resetToIdle(msg) {
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  reconnectAttempts = 0;
  bleCmdChar = null;
  bleServer = null;
  txQueue.length = 0;
  txBusy = false;
  setConnState('idle', msg);
}

function onConnected() {
  reconnectAttempts = 0;
  userInitiatedDisconnect = false;
  setConnState('connected');
  // Let Android's GATT stack settle after discovery before the first write.
  // The syncAll writes are queued and sent one at a time, so they won't
  // collide with "GATT operation already in progress". This also re-pushes
  // full state after an auto-reconnect, so the lamp matches the UI again.
  setTimeout(syncAll, 800);
}

// Fired by the radio on ANY disconnect — user-requested or a dropout.
function onGattDisconnected() {
  bleCmdChar = null;
  bleServer = null;
  txQueue.length = 0;
  txBusy = false;

  if (userInitiatedDisconnect) { resetToIdle(); return; }
  attemptReconnect();
}

// Reuse the already-picked device (no re-prompt) with a capped backoff.
function attemptReconnect() {
  if (!bleDevice || userInitiatedDisconnect) { resetToIdle(); return; }

  if (reconnectAttempts >= RECONNECT_MAX) {
    // Give up gracefully; leave a tappable path back (button = Connect to Orb).
    reconnectAttempts = 0;
    setConnState('error', 'Lost connection — tap Connect to retry');
    return;
  }

  reconnectAttempts++;
  setConnState('reconnecting',
    'Reconnecting… (' + reconnectAttempts + '/' + RECONNECT_MAX + ')');

  var delay = RECONNECT_BASE_MS * reconnectAttempts;
  reconnectTimer = setTimeout(function() {
    reconnectTimer = null;
    if (userInitiatedDisconnect || !bleDevice) { resetToIdle(); return; }
    establishGatt(bleDevice).catch(function(e) {
      console.error('reconnect attempt failed:', e);
      if (userInitiatedDisconnect) { resetToIdle(); return; }
      attemptReconnect(); // next attempt, or give up if capped
    });
  }, delay);
}

// Map raw Web Bluetooth errors to something a human can act on.
function friendlyError(e) {
  if (!e) return 'Connection error';
  var name = e.name || '';
  var msg  = e.message || String(e);
  if (name === 'SecurityError')  return 'Bluetooth blocked — needs HTTPS + permission';
  if (name === 'NetworkError')   return 'Connection failed — is the orb powered and near?';
  if (name === 'NotSupportedError') return 'Web Bluetooth not supported here';
  if (/timed out/i.test(msg))    return 'Connect timed out — try again';
  return msg;
}

// The chooser being dismissed (or finding nothing) throws NotFoundError; treat
// it as a quiet no-op rather than a scary error.
function isPickerCancel(e) {
  return e && e.name === 'NotFoundError';
}

// ── Send a command ─────────────────────────────────────────────
// Commands are newline-terminated JSON written to the custom command
// characteristic. The firmware's onWrite reassembles and dispatches them.
function send(obj) {
  if (!bleCmdChar) { setStatus('Not connected'); return; }
  var msg = JSON.stringify(obj) + '\n';
  txQueue.push(new TextEncoder().encode(msg));
  pumpQueue();
}

// Comms self-test: {cmd:'test'} makes the firmware flash the red LED.
function flashTest() {
  send({ cmd: 'test' });
}

document.getElementById('connectBtn').addEventListener('click', function() {
  // Connected → user wants to disconnect. Reset the UI immediately rather
  // than waiting for the disconnect event (the event handler is idempotent).
  if (connState === 'connected') {
    userInitiatedDisconnect = true;
    try { bleDisconnect(); } catch (e) { console.error(e); }
    resetToIdle();
    return;
  }

  // Mid-flight (connecting / reconnecting) → treat the button as Cancel.
  if (connState === 'connecting' || connState === 'reconnecting' || connState === 'scanning') {
    userInitiatedDisconnect = true;
    try { bleDisconnect(); } catch (e) { console.error(e); }
    resetToIdle('Cancelled');
    return;
  }

  // Idle / error → start a fresh connection.
  if (!navigator.bluetooth) {
    setConnState('error', 'Web Bluetooth not supported');
    return;
  }
  userInitiatedDisconnect = false;
  reconnectAttempts = 0;
  bleConnect().catch(function(e) {
    if (isPickerCancel(e)) { resetToIdle(); return; }
    console.error(e);
    setConnState('error', friendlyError(e));
  });
});

function syncAll() {
  // Send mode FIRST. The firmware guards setBreathSpeed/setBrightness by
  // currentMode, so establishing the mode up front means later parameter
  // commands apply cleanly without briefly forcing breathing in solid mode.
  send({ cmd: 'mode',        value: state.on ? state.mode : 'off' });
  send({ cmd: 'brightness',  value: state.brightness });
  send({ cmd: 'breathSpeed', value: state.breathNorm });
  send({ cmd: 'sleep',       value: state.sleepOn });
}

// ── Power toggle ───────────────────────────────────────────────
document.getElementById('powerToggle').addEventListener('click', function() {
  state.on = !state.on;
  this.classList.toggle('on', state.on);
  updateBodyClass();
  send({ cmd: 'mode', value: state.on ? state.mode : 'off' });
});

// ── Mode buttons ───────────────────────────────────────────────
document.getElementById('modeBreathing').addEventListener('click', function() { setMode('breathing'); });
document.getElementById('modeSolid').addEventListener('click',     function() { setMode('solid'); });

function setMode(m) {
  state.mode = m;
  document.getElementById('modeBreathing').classList.toggle('active', m === 'breathing');
  document.getElementById('modeSolid').classList.toggle('active',     m === 'solid');
  document.getElementById('speedCard').classList.toggle('dimmed', m === 'solid');
  updateBodyClass();
  if (state.on) send({ cmd: 'mode', value: m });
}

// ── Brightness slider ──────────────────────────────────────────
var brightnessSlider = document.getElementById('brightnessSlider');
brightnessSlider.addEventListener('input', function() {
  var pct = parseInt(this.value);
  state.brightness = pct / 100;
  document.getElementById('brightnessVal').textContent = pct + '%';
  updateTrack(this);
  if (state.connected) send({ cmd: 'brightness', value: state.brightness });
});

// ── Speed slider ───────────────────────────────────────────────
var speedSlider = document.getElementById('speedSlider');
speedSlider.addEventListener('input', function() {
  state.breathNorm = parseInt(this.value) / 100;
  // Must match the firmware: hz = minHz + norm * (maxHz - minHz),
  // minHz 0.05 (20.0s/cycle, slowest) to maxHz 0.6 (1.67s/cycle, fastest).
  var hz = 0.05 + state.breathNorm * 0.55;
  var cycle = (1 / hz).toFixed(1);
  document.getElementById('speedVal').textContent = cycle + ' s';
  document.documentElement.style.setProperty('--breath-s', cycle + 's');
  updateTrack(this);
  if (state.connected) send({ cmd: 'breathSpeed', value: state.breathNorm });
});

// ── Sleep toggle ───────────────────────────────────────────────
document.getElementById('sleepToggle').addEventListener('click', function() {
  state.sleepOn = !state.sleepOn;
  this.classList.toggle('on', false);          // remove generic on class
  this.classList.toggle('sleep-on', state.sleepOn);
  if (state.connected) send({ cmd: 'sleep', value: state.sleepOn });
});

// ── Helpers ────────────────────────────────────────────────────
function updateBodyClass() {
  document.body.classList.toggle('lamp-off',       !state.on);
  document.body.classList.toggle('lamp-solid',      state.on && state.mode === 'solid');
  document.body.classList.toggle('lamp-breathing',  state.on && state.mode === 'breathing');
}

function updateTrack(el) {
  var pct = ((el.value - el.min) / (el.max - el.min) * 100).toFixed(1) + '%';
  el.style.setProperty('--pct', pct);
}

function setStatus(msg) {
  document.getElementById('statusLine').textContent = msg;
}

// ── Comms test button ──────────────────────────────────────────
document.getElementById('testBtn').addEventListener('click', function() {
  if (!state.connected) { setStatus('Connect first'); return; }
  setStatus('Comms test: flashing red LED');
  flashTest();
});

// ── Init ───────────────────────────────────────────────────────
document.getElementById('versionLine').textContent = 'App ' + APP_VERSION;
updateTrack(brightnessSlider);
updateTrack(speedSlider);
setMode('breathing');
// Reflect the default ON state in the Power toggle + ambient glow so the UI
// matches the lamp (and the mode command syncAll will send) before connecting.
document.getElementById('powerToggle').classList.toggle('on', state.on);
updateBodyClass();
setConnState('idle');
</script>
</body>
</html>
