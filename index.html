<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#12162a">
  <title>Orb Lamp</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <!-- Espruino's proven Web Bluetooth helper. Used by the "Library"
       transport mode as an A/B reference against the custom BLE code.
       Loaded async; if it fails to load, Library mode is disabled. -->
  <script src="https://www.puck-js.com/puck.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #12162a;
      --orb:       #f0a500;
      --orb-dim:   #7a5200;
      --orb-dark:  #3a2800;
      --cream:     #f0e6c8;
      --cream-dim: #a08c6e;
      --glass:     rgba(255,255,255,0.06);
      --green:     #4caf82;
      --breath-s:  5s;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--cream);
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    /* Ambient glow — breathes with the lamp */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 45%,
        rgba(240,165,0,0.22) 0%,
        rgba(240,165,0,0.06) 45%,
        transparent 70%);
      animation: ambient-breath var(--breath-s) ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
      transition: opacity 0.8s ease;
    }

    @keyframes ambient-breath {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.06); }
    }

    body.lamp-off::before    { animation: none; opacity: 0; }
    body.lamp-solid::before  { animation: none; opacity: 1; }

    @media (prefers-reduced-motion: reduce) {
      body::before { animation: none !important; }
    }

    /* Layout */
    .app {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 3vh 6vw 4vh;
      max-width: 440px;
      margin: 0 auto;
    }

    /* Header */
    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .orb-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 0 24px rgba(240,165,0,0.4), 0 0 8px rgba(240,165,0,0.2);
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      color: var(--orb);
      text-transform: uppercase;
    }

    .status-line {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      color: var(--cream-dim);
      text-transform: uppercase;
      min-height: 1em;
    }

    /* Controls */
    .controls {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      background: var(--glass);
      border: 1px solid rgba(240,165,0,0.14);
      border-radius: 16px;
      padding: 16px 20px;
      backdrop-filter: blur(8px);
    }

    .card-label {
      font-size: 0.65rem;
      letter-spacing: 0.16em;
      color: var(--cream-dim);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* Row layout for label + toggle */
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .row-label {
      font-family: 'Cinzel', serif;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      color: var(--cream);
    }

    .row-sublabel {
      font-size: 0.68rem;
      color: var(--cream-dim);
      margin-top: 2px;
      letter-spacing: 0.05em;
    }

    /* Toggle switch — reused for power and sleep */
    .toggle {
      width: 56px;
      height: 30px;
      border-radius: 15px;
      border: 2px solid var(--orb-dim);
      background: var(--orb-dark);
      position: relative;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.3s, border-color 0.3s;
      -webkit-tap-highlight-color: transparent;
    }

    .toggle::after {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--cream-dim);
      transition: transform 0.3s, background 0.3s;
    }

    .toggle.on {
      background: var(--orb-dim);
      border-color: var(--orb);
    }

    .toggle.on::after {
      transform: translateX(26px);
      background: var(--orb);
      box-shadow: 0 0 8px rgba(240,165,0,0.6);
    }

    /* Green variant for sleep toggle */
    .toggle.sleep-on {
      background: rgba(76,175,130,0.25);
      border-color: var(--green);
    }

    .toggle.sleep-on::after {
      transform: translateX(26px);
      background: var(--green);
      box-shadow: 0 0 8px rgba(76,175,130,0.5);
    }

    /* Mode buttons */
    .mode-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .mode-btn {
      padding: 11px 8px;
      border-radius: 12px;
      border: 1.5px solid var(--orb-dim);
      background: transparent;
      color: var(--cream-dim);
      font-family: 'Cinzel', serif;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.25s;
      -webkit-tap-highlight-color: transparent;
    }

    .mode-btn.active {
      border-color: var(--orb);
      background: rgba(240,165,0,0.12);
      color: var(--orb);
      box-shadow: 0 0 12px rgba(240,165,0,0.15);
    }

    /* Sliders */
    .slider-row { display: flex; flex-direction: column; gap: 8px; }
    .slider-row + .slider-row { margin-top: 16px; }

    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .slider-name {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--cream-dim);
      text-transform: uppercase;
    }

    .slider-value {
      font-size: 0.76rem;
      color: var(--orb);
      font-variant-numeric: tabular-nums;
      min-width: 3.5em;
      text-align: right;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(to right,
        var(--orb) 0%, var(--orb) var(--pct,40%),
        var(--orb-dark) var(--pct,40%), var(--orb-dark) 100%);
      outline: none;
      cursor: pointer;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--orb);
      border: 2px solid var(--bg);
      box-shadow: 0 0 8px rgba(240,165,0,0.5);
      cursor: pointer;
    }

    input[type=range]::-moz-range-thumb {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--orb);
      border: 2px solid var(--bg);
      box-shadow: 0 0 8px rgba(240,165,0,0.5);
      cursor: pointer;
    }

    /* Speed slider dims when in solid mode */
    .speed-card { transition: opacity 0.3s; }
    .speed-card.dimmed { opacity: 0.35; pointer-events: none; }

    /* Connect button */
    .connect-btn {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1.5px solid var(--orb);
      background: rgba(240,165,0,0.10);
      color: var(--orb);
      font-family: 'Cinzel', serif;
      font-size: 0.88rem;
      letter-spacing: 0.14em;
      cursor: pointer;
      transition: background 0.25s, box-shadow 0.25s;
      -webkit-tap-highlight-color: transparent;
    }

    .connect-btn:active {
      background: rgba(240,165,0,0.22);
    }

    .connect-btn.connected {
      border-color: var(--green);
      color: var(--green);
      background: rgba(76,175,130,0.08);
    }

    .controls-inner {
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: opacity 0.4s;
    }

    .controls-inner.disabled {
      opacity: 0.35;
      pointer-events: none;
    }

    /* Transport A/B diagnostics strip */
    .transport-strip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .transport-label {
      font-size: 0.62rem;
      letter-spacing: 0.16em;
      color: var(--cream-dim);
      text-transform: uppercase;
    }

    .transport-seg {
      display: inline-flex;
      border: 1px solid var(--orb-dim);
      border-radius: 10px;
      overflow: hidden;
    }

    .seg-btn {
      padding: 6px 14px;
      border: none;
      background: transparent;
      color: var(--cream-dim);
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .seg-btn.active {
      background: rgba(240,165,0,0.14);
      color: var(--orb);
    }

    .seg-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .transport-hint {
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      color: var(--cream-dim);
      text-align: center;
      min-height: 1em;
      opacity: 0.8;
    }
  </style>
</head>
<body class="lamp-off">
<div class="app">

  <header>
    <img src="icon-192.png" class="orb-icon" alt="Orb Lamp">
    <h1>Orb Lamp</h1>
    <div class="status-line" id="statusLine">Not connected</div>
  </header>

  <div class="controls">

    <!-- Diagnostics: transport A/B toggle -->
    <div class="transport-strip">
      <span class="transport-label">Transport</span>
      <div class="transport-seg" id="transportSeg">
        <button class="seg-btn active" id="segCustom" data-mode="custom">Custom</button>
        <button class="seg-btn" id="segLibrary" data-mode="library">Library</button>
      </div>
    </div>
    <div class="transport-hint" id="transportHint">
      Custom code · needs REPL detached firmware
    </div>

    <button class="connect-btn" id="connectBtn">Connect to Orb</button>

    <div class="controls-inner disabled" id="controlsInner">

      <!-- Power -->
      <div class="card">
        <div class="row">
          <span class="row-label">Power</span>
          <button class="toggle" id="powerToggle" aria-label="Power"></button>
        </div>
      </div>

      <!-- Mode -->
      <div class="card">
        <div class="card-label">Mode</div>
        <div class="mode-row">
          <button class="mode-btn active" id="modeBreathing">Breathing</button>
          <button class="mode-btn" id="modeSolid">Solid</button>
        </div>
      </div>

      <!-- Brightness -->
      <div class="card">
        <div class="card-label">Brightness</div>
        <div class="slider-row">
          <div class="slider-header">
            <span class="slider-name">Level</span>
            <span class="slider-value" id="brightnessVal">40%</span>
          </div>
          <input type="range" id="brightnessSlider" min="5" max="100" value="40"
                 aria-label="Brightness">
        </div>
      </div>

      <!-- Breathing speed -->
      <div class="card speed-card" id="speedCard">
        <div class="card-label">Breath speed</div>
        <div class="slider-row">
          <div class="slider-header">
            <span class="slider-name">Cycle</span>
            <span class="slider-value" id="speedVal">5.0 s</span>
          </div>
          <input type="range" id="speedSlider" min="0" max="100" value="0"
                 aria-label="Breathing speed">
        </div>
      </div>

      <!-- Sleep timer -->
      <div class="card">
        <div class="row">
          <div>
            <div class="row-label">Sleep timer</div>
            <div class="row-sublabel">Turn off after 1 hour of inactivity</div>
          </div>
          <button class="toggle" id="sleepToggle" aria-label="Sleep timer"></button>
        </div>
      </div>

    </div>
  </div>

</div>

<script>
// ── BLE UUIDs (Nordic UART) ────────────────────────────────────
var UART_SERVICE = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
var UART_TX      = '6e400002-b5a3-f393-e0a9-e50e24dcca9e'; // phone → Puck (write to this)
var UART_RX      = '6e400003-b5a3-f393-e0a9-e50e24dcca9e'; // Puck → phone (notify)

// ── State ──────────────────────────────────────────────────────
var state = {
  connected:   false,
  on:          false,
  mode:        'breathing',
  brightness:  0.40,
  breathNorm:  0,
  sleepOn:     false,
};

var bleDevice = null, bleServer = null, bleTxChar = null;

// ── Transport A/B ──────────────────────────────────────────────
// Two ways to reach the Puck, switchable at runtime for diagnosis:
//
//   'custom'  — the hand-written Web Bluetooth code below. Sends
//               newline-delimited JSON to the TX characteristic.
//               REQUIRES firmware with the REPL detached
//               (E.setConsole(null,{force:true})) so NRF.on('data')
//               receives the JSON.
//
//   'library' — Espruino's proven puck.js helper (Puck.write). It
//               sends text to the REPL, which evaluates it. So it
//               instead calls the firmware's setter FUNCTIONS by
//               name, e.g. setMode("solid"). REQUIRES the REPL to be
//               PRESENT (do NOT detach the console).
//
// The two modes need opposite firmware states, which is exactly what
// makes them a clean diagnostic: if 'library' works and 'custom'
// doesn't, the connection/write mechanism is fine and the fault is in
// the custom GATT handling or the firmware data handler. If both fail,
// the problem is environmental (this Android/Chrome BLE stack).
var transportMode = 'custom'; // 'custom' | 'library'
var libAvailable = (typeof Puck !== 'undefined');

// ── Custom transport: raw Web Bluetooth ────────────────────────
// Android permits only ONE outstanding GATT operation at a time.
// Firing several writeValue() calls back to back rejects all but the
// first with "GATT operation already in progress". So we queue writes
// and send them strictly one after another.
var txQueue = [], txBusy = false;

function pumpQueue() {
  if (txBusy || txQueue.length === 0) return;
  if (!bleTxChar || !bleServer || !bleServer.connected) {
    setStatus('Not connected — reconnect');
    txQueue.length = 0;
    return;
  }
  txBusy = true;
  var bytes = txQueue.shift();
  bleTxChar.writeValue(bytes)
    .then(function() { txBusy = false; pumpQueue(); })
    .catch(function(e) {
      txBusy = false;
      setStatus('Write failed: ' + (e && e.message ? e.message : e));
      console.error('writeValue rejected:', e);
      txQueue.length = 0;
    });
}

var customTransport = {
  connect: function() {
    setStatus('Scanning…');
    return navigator.bluetooth.requestDevice({
      filters: [{ namePrefix: 'Puck' }, { namePrefix: 'puck' }],
      optionalServices: [UART_SERVICE]
    })
    .then(function(d) {
      bleDevice = d;
      bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
      setStatus('Connecting…');
      return d.gatt.connect();
    })
    .then(function(s)  { bleServer = s; return s.getPrimaryService(UART_SERVICE); })
    .then(function(sv) { return sv.getCharacteristic(UART_TX); })
    .then(function(c)  { bleTxChar = c; onConnected(); });
  },
  disconnect: function() {
    if (bleDevice && bleDevice.gatt.connected) bleDevice.gatt.disconnect();
  },
  // Custom mode speaks JSON to the detached-REPL firmware.
  sendCommand: function(obj) {
    if (!bleTxChar) { setStatus('Not connected'); return; }
    var msg = JSON.stringify(obj) + '\n';
    txQueue.push(new TextEncoder().encode(msg));
    pumpQueue();
  }
};

// ── Library transport: Espruino puck.js helper ─────────────────
// Puck.write sends text to the REPL. We translate each command object
// into a direct call to the firmware's setter functions, which the
// REPL evaluates. Puck.write serializes its own writes internally, so
// no queue is needed here.
function cmdToEspruinoCall(obj) {
  // Mirrors the firmware's BLE command dispatch, but as function calls.
  switch (obj.cmd) {
    case 'mode':        return 'setMode(' + JSON.stringify(obj.value) + ');\n';
    case 'breathSpeed': return 'setBreathSpeed(' + Number(obj.value) + ');\n';
    case 'brightness':  return 'setBrightness(' + Number(obj.value) + ');\n';
    case 'sleep':       return 'setSleep(' + (obj.value ? 'true' : 'false') + ');\n';
    default:            return '';
  }
}

var libraryTransport = {
  connect: function() {
    setStatus('Connecting (library)…');
    return new Promise(function(resolve, reject) {
      // Puck.connect opens and remembers a single connection so
      // subsequent Puck.write calls reuse it.
      Puck.connect(function(conn) {
        if (!conn) { reject(new Error('Puck.connect returned null')); return; }
        conn.on('close', onDisconnected);
        onConnected();
        resolve();
      });
    });
  },
  disconnect: function() {
    if (typeof Puck !== 'undefined' && Puck.getConnection && Puck.getConnection()) {
      Puck.getConnection().close();
    }
  },
  sendCommand: function(obj) {
    var call = cmdToEspruinoCall(obj);
    if (!call) return;
    // Puck.write returns a promise; surface failures like the custom path
    // so the two modes are comparable when diagnosing.
    var p = Puck.write(call, function() {});
    if (p && p.catch) {
      p.catch(function(e) {
        setStatus('Lib write failed: ' + (e && e.message ? e.message : e));
        console.error('Puck.write rejected:', e);
      });
    }
  }
};

function activeTransport() {
  return transportMode === 'library' ? libraryTransport : customTransport;
}

// ── Unified send ───────────────────────────────────────────────
function send(obj) {
  activeTransport().sendCommand(obj);
}

document.getElementById('connectBtn').addEventListener('click', function() {
  if (state.connected) { activeTransport().disconnect(); return; }
  if (transportMode === 'custom' && !navigator.bluetooth) {
    setStatus('Web Bluetooth not supported');
    return;
  }
  if (transportMode === 'library' && !libAvailable) {
    setStatus('puck.js library failed to load');
    return;
  }
  activeTransport().connect().catch(function(e) {
    setStatus('Connect failed: ' + (e && e.message ? e.message : e));
    console.error(e);
  });
});

// ── Transport toggle ───────────────────────────────────────────
var HINTS = {
  custom:  'Custom code · needs REPL-detached firmware',
  library: 'puck.js library · needs REPL present (do not detach)'
};

function setTransport(mode) {
  if (state.connected) {
    setStatus('Disconnect before switching transport');
    return;
  }
  if (mode === 'library' && !libAvailable) {
    setStatus('puck.js library unavailable');
    return;
  }
  transportMode = mode;
  document.getElementById('segCustom').classList.toggle('active', mode === 'custom');
  document.getElementById('segLibrary').classList.toggle('active', mode === 'library');
  document.getElementById('transportHint').textContent = HINTS[mode];
}

document.getElementById('segCustom').addEventListener('click', function() { setTransport('custom'); });
document.getElementById('segLibrary').addEventListener('click', function() { setTransport('library'); });

// Disable Library segment if the helper script didn't load.
if (!libAvailable) {
  var segLib = document.getElementById('segLibrary');
  segLib.disabled = true;
  segLib.title = 'puck.js library failed to load';
}

function onConnected() {
  state.connected = true;
  document.getElementById('connectBtn').textContent = 'Disconnect';
  document.getElementById('connectBtn').classList.add('connected');
  document.getElementById('controlsInner').classList.remove('disabled');
  setStatus('Connected');
  // Let Android's GATT stack finish settling after discovery before the
  // first write. 500ms is marginal on some stacks; 800ms is safer. The
  // four syncAll writes are now queued and sent one at a time, so they
  // no longer collide with "GATT operation already in progress".
  setTimeout(syncAll, 800);
}

function onDisconnected() {
  state.connected = false;
  bleTxChar = null;
  bleServer = null;
  txQueue.length = 0;
  txBusy = false;
  document.getElementById('connectBtn').textContent = 'Connect to Orb';
  document.getElementById('connectBtn').classList.remove('connected');
  document.getElementById('controlsInner').classList.add('disabled');
  setStatus('Disconnected');
}

function disconnect() {
  // Kept for any external callers; delegates to the active transport.
  activeTransport().disconnect();
}

function syncAll() {
  // Send brightness and breath speed FIRST so that when 'mode' starts the
  // lamp, it already reads the correct values. Sending 'mode' first would
  // start breathing with stale values and then restart it 2-3 times as the
  // later commands arrive (each setBreathSpeed/setMode calls startBreathing),
  // which looks janky. Order here matters for both transports.
  send({ cmd: 'brightness', value: state.brightness });
  send({ cmd: 'breathSpeed',value: state.breathNorm });
  send({ cmd: 'sleep',      value: state.sleepOn });
  send({ cmd: 'mode',       value: state.on ? state.mode : 'off' });
}

// ── Power toggle ───────────────────────────────────────────────
document.getElementById('powerToggle').addEventListener('click', function() {
  state.on = !state.on;
  this.classList.toggle('on', state.on);
  updateBodyClass();
  send({ cmd: 'mode', value: state.on ? state.mode : 'off' });
});

// ── Mode buttons ───────────────────────────────────────────────
document.getElementById('modeBreathing').addEventListener('click', function() { setMode('breathing'); });
document.getElementById('modeSolid').addEventListener('click',     function() { setMode('solid'); });

function setMode(m) {
  state.mode = m;
  document.getElementById('modeBreathing').classList.toggle('active', m === 'breathing');
  document.getElementById('modeSolid').classList.toggle('active',     m === 'solid');
  document.getElementById('speedCard').classList.toggle('dimmed', m === 'solid');
  updateBodyClass();
  if (state.on) send({ cmd: 'mode', value: m });
}

// ── Brightness slider ──────────────────────────────────────────
var brightnessSlider = document.getElementById('brightnessSlider');
brightnessSlider.addEventListener('input', function() {
  var pct = parseInt(this.value);
  state.brightness = pct / 100;
  document.getElementById('brightnessVal').textContent = pct + '%';
  updateTrack(this);
  if (state.connected) send({ cmd: 'brightness', value: state.brightness });
});

// ── Speed slider ───────────────────────────────────────────────
var speedSlider = document.getElementById('speedSlider');
speedSlider.addEventListener('input', function() {
  state.breathNorm = parseInt(this.value) / 100;
  var hz = 0.2 + state.breathNorm * 0.4;
  var cycle = (1 / hz).toFixed(1);
  document.getElementById('speedVal').textContent = cycle + ' s';
  document.documentElement.style.setProperty('--breath-s', cycle + 's');
  updateTrack(this);
  if (state.connected) send({ cmd: 'breathSpeed', value: state.breathNorm });
});

// ── Sleep toggle ───────────────────────────────────────────────
document.getElementById('sleepToggle').addEventListener('click', function() {
  state.sleepOn = !state.sleepOn;
  this.classList.toggle('on', false);          // remove generic on class
  this.classList.toggle('sleep-on', state.sleepOn);
  if (state.connected) send({ cmd: 'sleep', value: state.sleepOn });
});

// ── Helpers ────────────────────────────────────────────────────
function updateBodyClass() {
  document.body.classList.toggle('lamp-off',       !state.on);
  document.body.classList.toggle('lamp-solid',      state.on && state.mode === 'solid');
  document.body.classList.toggle('lamp-breathing',  state.on && state.mode === 'breathing');
}

function updateTrack(el) {
  var pct = ((el.value - el.min) / (el.max - el.min) * 100).toFixed(1) + '%';
  el.style.setProperty('--pct', pct);
}

function setStatus(msg) {
  document.getElementById('statusLine').textContent = msg;
}

// ── Init ───────────────────────────────────────────────────────
updateTrack(brightnessSlider);
updateTrack(speedSlider);
setMode('breathing');
setTransport('custom'); // sync toggle UI + hint with default transport
</script>
</body>
</html>
